function WorkoutCard({day,isComplete,onToggle,onDragStart,onDragOver,onDrop,isDragging}){
const[showDetails,setShowDetails]=useState(false);

if(!day){
return <div className="bg-pink-50 border-2 border-dashed border-pink-200 rounded-lg p-4 text-center text-pink-300" onDragOver={onDragOver} onDrop={onDrop}>Drop workout here to reschedule</div>;
