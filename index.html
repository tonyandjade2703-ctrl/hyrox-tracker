<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jade Training</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>*{-webkit-tap-highlight-color:transparent}body{margin:0;padding:0;font-family:-apple-system,sans-serif;background:#000}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const Icon=({d,s=24})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" dangerouslySetInnerHTML={{__html:d}}/>;
const Calendar=()=><Icon d='<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'/>;
const Plus=()=><Icon d='<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>'/>;
const User=()=><Icon d='<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>'/>;
const Check=()=><Icon d='<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'/>;
const Flame=()=><Icon d='<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>'/>;
const Trend=()=><Icon d='<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>'/>;
const Clock=()=><Icon d='<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'/>;

function WorkoutCard({day,isComplete,onToggle,onDragStart,onDragOver,onDrop,isDragging}){
const[show,setShow]=useState(false);
if(!day)return <div className="bg-gray-50 border-2 border-dashed border-gray-300 rounded-lg p-4 text-center text-gray-400" onDragOver={onDragOver} onDrop={onDrop}>Drop workout here</div>;
return <div className={`bg-white border-2 rounded-lg p-4 cursor-move ${isComplete?'shadow-lg':''} ${isDragging?'opacity-50':''}`} style={isComplete?{borderColor:'#F50'}:{borderColor:'#ddd'}} draggable onDragStart={onDragStart} onDragOver={onDragOver} onDrop={onDrop}>
<div className="flex gap-4">
<button onClick={onToggle} className="w-6 h-6 rounded border-2 flex items-center justify-center" style={isComplete?{backgroundColor:'#F50',borderColor:'#F50',color:'#fff'}:{borderColor:'#ddd'}}>{isComplete&&<Check/>}</button>
<div className="flex-1">
<div className="flex justify-between mb-2">
<div><div className="font-bold text-lg text-black">{day.day}</div><div className="text-sm text-gray-600">{day.type} - {day.focus}</div></div>
<div className="px-3 py-1 rounded-full text-xs font-bold text-white" style={{backgroundColor:day.type.includes('Rest')?'#666':day.type.includes('Strength')?'#000':'#F50'}}>{day.type}</div>
</div>
<div className="text-sm text-gray-700 mb-2">{day.detail}</div>
<button onClick={()=>setShow(!show)} className="text-xs font-bold" style={{color:'#F50'}}>{show?'▼ Hide':'▶ Show'} Details</button>
{show&&<div className="mt-3 p-3 bg-gray-50 rounded text-sm text-black whitespace-pre-line">{day.specifics}</div>}
</div>
</div>
</div>
}

function App(){
const[tab,setTab]=useState('plan');
const[workouts,setWorkouts]=useState([]);
const[comp,setComp]=useState({});
const[week,setWeek]=useState(1);
const[showLog,setShowLog]=useState(false);
const[currWo,setCurrWo]=useState({date:new Date().toISOString().split('T')[0],type:'',duration:'',notes:''});
const[sched,setSched]=useState({});
const[drag,setDrag]=useState(null);

useEffect(()=>{try{setWorkouts(JSON.parse(localStorage.getItem('j_wo')||'[]'));setComp(JSON.parse(localStorage.getItem('j_c')||'{}'));setSched(JSON.parse(localStorage.getItem('j_s')||'{}'))}catch(e){}},[] );
useEffect(()=>{localStorage.setItem('j_wo',JSON.stringify(workouts))},[workouts]);
useEffect(()=>{localStorage.setItem('j_c',JSON.stringify(comp))},[comp]);
useEffect(()=>{localStorage.setItem('j_s',JSON.stringify(sched))},[sched]);

const plans={1:[{day:'Mon Dec 8',type:'Rest',focus:'Rest',detail:'Recovery',specifics:'Rest day\n8+ hrs sleep\nHydration: 3L'},{day:'Tue Dec 9',type:'Strength',focus:'Lower',detail:'Squat/RDL/Split',specifics:'Squat 4x6@75kg\nRDL 3x8@60kg\nBulgarian 3x8@16kg\nNordic 3x5\nCore'},{day:'Wed Dec 10',type:'Run+Station',focus:'Easy+Stations',detail:'5km easy',specifics:'5km@6:45/km\n3 rounds:\nSkiErg 500m\nSled 50m@102kg\nBurpees 10'},{day:'Thu Dec 11',type:'Rest',focus:'Rest',detail:'Recovery',specifics:'Rest day\n8+ hrs sleep'},{day:'Fri Dec 12',type:'Tempo',focus:'Threshold',detail:'7km tempo',specifics:'4km@5:50/km\nTotal: 7km'},{day:'Sat Dec 13',type:'Strength',focus:'Upper',detail:'Bench/Pull/Row',specifics:'Bench 4x6@37.5kg\nPull-up 4x5+5kg\nPress 3x8@12kg\nRow 3x10@16kg\nCarry 3x50m@20kg\nWall balls 3x20@6kg'},{day:'Sun Dec 14',type:'Long Run',focus:'Base',detail:'12km easy',specifics:'12km@6:30/km\nStrides 3x100m'}],2:[{day:'Mon Dec 15',type:'Rest',focus:'Rest',detail:'Recovery',specifics:'Rest day'},{day:'Tue Dec 16',type:'Strength',focus:'Lower',detail:'Squat progress',specifics:'Squat 4x6@77.5kg\nRDL 3x8@62.5kg\nBulgarian 3x8@18kg\nNordic 3x6'},{day:'Wed Dec 17',type:'Run+Station',focus:'Easy+Stations',detail:'5km easy',specifics:'5km@6:40/km\n3 rounds stations'},{day:'Thu Dec 18',type:'Rest',focus:'Rest',detail:'Recovery',specifics:'Rest day'},{day:'Fri Dec 19',type:'Tempo',focus:'Threshold',detail:'7km tempo',specifics:'4km@5:50/km'},{day:'Sat Dec 20',type:'Strength',focus:'Upper',detail:'Bench/Pull/Row',specifics:'Bench 4x6@38.75kg\nPull-up 4x6+5kg\nPress 3x8@12kg\nRow 3x10@18kg'},{day:'Sun Dec 21',type:'Long Run',focus:'Base',detail:'12km',specifics:'12km@6:25/km'}]};

const phases={1:{phase:'Base',dates:'Dec 8-14',focus:'Foundation',intensity:'Low-Mod',notes:'Building base',startDate:'2025-12-08'},2:{phase:'Base',dates:'Dec 15-21',focus:'Volume up',intensity:'Low-Mod',notes:'Progress overload',startDate:'2025-12-15'}};

const tc=(w,i)=>setComp(p=>({...p,[`j-${w}-${i}`]:!p[`j-${w}-${i}`]}));
const ic=(w,i)=>comp[`j-${w}-${i}`]||false;
const gc=(w)=>{const t=plans[w];if(!t)return{c:0,t:0,p:0};let c=0;t.forEach((_,i)=>{if(ic(w,i))c++});return{c,t:t.length,p:Math.round(c/t.length*100)}};
const gs=()=>{const p=plans[week];if(!p)return{t:0,r:0,s:0,h:0};let r=0,s=0,h=0,t=0;p.forEach((d,i)=>{if(ic(week,i)){t++;if(d.type.includes('Run')||d.type==='Tempo'||d.type==='Easy Run')r++;if(d.type==='Strength')s++;if(d.type.includes('Station')||d.type.includes('Hyrox')||d.type.includes('Power'))h++}});return{t,r,s,h}};
const lw=()=>{if(!currWo.type)return;setWorkouts([{...currWo,id:Date.now()},...workouts]);setCurrWo({date:new Date().toISOString().split('T')[0],type:'',duration:'',notes:''});setShowLog(false)};
const gwd=(w,i)=>{const k=`${w}-${i}`;if(sched[k]!==undefined)return{w:plans[w][sched[k]],oi:sched[k]};const mt=Object.keys(sched).find(key=>sched[key]===i&&key.startsWith(`${w}-`));if(mt)return{w:null,oi:i};return{w:plans[w][i],oi:i}};
const hds=(w,i)=>setDrag({week:w,index:i});
const hdo=(e)=>e.preventDefault();
const hdr=(w,ti)=>{if(!drag||drag.week!==w)return;const si=drag.index;if(si===ti)return;setSched(p=>{const n={...p};const sk=`${w}-${si}`,tk=`${w}-${ti}`;const swi=p[sk]!==undefined?p[sk]:si,twi=p[tk]!==undefined?p[tk]:ti;n[sk]=twi;n[tk]=swi;return n});setDrag(null)};
const rs=(w)=>setSched(p=>{const n={...p};Object.keys(n).forEach(k=>{if(k.startsWith(`${w}-`))delete n[k]});return n});

const cp=plans[week]||[];
const cph=phases[week];

return <div className="min-h-screen bg-black text-white p-4">
<div className="max-w-6xl mx-auto">
<div className="mb-6">
<div className="flex items-center gap-3 mb-4">
<Flame/><div><h1 className="text-2xl font-bold">Jade's Training</h1><p className="text-sm text-gray-400">18-Week Program</p></div>
</div>
<div className="bg-white rounded-lg p-4"><div className="flex gap-3"><User/><div><div className="font-bold text-black">Jade</div><div className="text-sm text-gray-600">33yo | Half+Hyrox+Marathon</div></div></div></div>
</div>

<div className="grid grid-cols-3 gap-3 mb-6">
<div className="bg-white rounded-lg p-3"><div className="text-xs text-gray-600">Half Marathon</div><div className="text-lg font-bold" style={{color:'#F50'}}>Mar 1</div><div className="text-xs text-gray-600">Sub 2:00</div></div>
<div className="bg-white rounded-lg p-3"><div className="text-xs text-gray-600">Solo Hyrox</div><div className="text-lg font-bold" style={{color:'#F50'}}>Mar 29</div><div className="text-xs text-gray-600">Sub 1:25</div></div>
<div className="bg-white rounded-lg p-3"><div className="text-xs text-gray-600">Marathon</div><div className="text-lg font-bold" style={{color:'#F50'}}>Apr 12</div><div className="text-xs text-gray-600">Finish</div></div>
</div>

<div className="grid grid-cols-4 gap-3 mb-6">{(()=>{const s=gs();return[{l:'Week',v:s.t},{l:'Run',v:s.r},{l:'Str',v:s.s},{l:'Hyb',v:s.h}].map((x,i)=><div key={i} className="bg-white rounded-lg p-3"><div className="text-xs text-gray-600">{x.l}</div><div className="text-2xl font-bold" style={{color:i===0?'#F50':'#000'}}>{x.v}</div></div>)})()}</div>

<div className="flex gap-2 mb-4 border-b-2 border-gray-700">{['plan','log','history'].map(t=><button key={t} onClick={()=>setTab(t)} className={`px-4 py-2 font-bold ${tab===t?'border-b-2':''}`} style={tab===t?{borderColor:'#F50',color:'#F50'}:{color:'#888'}}>{t}</button>)}</div>

<div className="bg-white rounded-lg p-4">
{tab==='plan'&&<div>
<h3 className="text-lg font-bold mb-4 text-black">Week {week}</h3>
<div className="flex gap-2 mb-4 overflow-x-auto">
<button onClick={()=>setWeek(Math.max(1,week-1))} disabled={week===1} className="px-3 py-2 border rounded text-black">←</button>
{[1,2].map(w=>{const c=gc(w);return <button key={w} onClick={()=>setWeek(w)} className="px-3 py-2 rounded font-bold" style={week===w?{backgroundColor:'#F50',color:'#fff'}:{backgroundColor:'#f5f5f5',color:'#000'}}>{w}{c.c>0&&<div className="text-xs">{c.p}%</div>}</button>})}
<button onClick={()=>setWeek(Math.min(2,week+1))} disabled={week===2} className="px-3 py-2 border rounded text-black">→</button>
</div>

{cph&&<div className="bg-gray-50 rounded-lg p-4 mb-4">
<div className="flex justify-between mb-2">
<div><h4 className="text-xl font-bold text-black">Week {week}</h4><div className="text-sm text-gray-600">{cph.dates}</div></div>
<button onClick={()=>rs(week)} className="px-3 py-2 text-xs border rounded text-black">Reset</button>
</div>
<div className="grid grid-cols-3 gap-3 text-sm"><div><div className="text-gray-600">Phase</div><div className="font-bold text-black">{cph.phase}</div></div><div><div className="text-gray-600">Intensity</div><div className="font-bold text-black">{cph.intensity}</div></div><div><div className="text-gray-600">Done</div><div className="font-bold text-black">{gc(week).c}/{gc(week).t}</div></div></div>
<div className="mt-2 text-xs text-gray-600 italic">{cph.notes}</div>
<div className="mt-2 text-xs bg-blue-50 p-2 rounded text-gray-600">💡 Drag workouts to reschedule</div>
</div>}

<div className="space-y-3">{cp.map((d,i)=>{const{w,oi}=gwd(week,i);return <WorkoutCard key={i} day={w} isComplete={ic(week,oi)} onToggle={()=>tc(week,oi)} onDragStart={()=>hds(week,i)} onDragOver={hdo} onDrop={()=>hdr(week,i)} isDragging={drag?.week===week&&drag?.index===i}/>})}</div>
</div>}

{tab==='log'&&<div>
{!showLog?<button onClick={()=>setShowLog(true)} className="w-full py-6 border-2 border-dashed rounded" style={{borderColor:'#F50'}}><Plus/><div className="font-bold mt-2" style={{color:'#F50'}}>Log Workout</div></button>:<div className="space-y-3">
<h3 className="font-bold text-black">Log Workout</h3>
<div><label className="block text-sm mb-1 text-black">Date</label><input type="date" value={currWo.date} onChange={e=>setCurrWo({...currWo,date:e.target.value})} className="w-full p-2 border rounded text-black"/></div>
<div><label className="block text-sm mb-1 text-black">Type</label><select value={currWo.type} onChange={e=>setCurrWo({...currWo,type:e.target.value})} className="w-full p-2 border rounded text-black"><option>Select</option><option>Running</option><option>Strength</option><option>Hybrid</option></select></div>
<div><label className="block text-sm mb-1 text-black">Duration (min)</label><input type="number" value={currWo.duration} onChange={e=>setCurrWo({...currWo,duration:e.target.value})} className="w-full p-2 border rounded text-black"/></div>
<div><label className="block text-sm mb-1 text-black">Notes</label><textarea value={currWo.notes} onChange={e=>setCurrWo({...currWo,notes:e.target.value})} className="w-full p-2 border rounded text-black h-20"/></div>
<div className="flex gap-2"><button onClick={lw} className="flex-1 py-2 rounded font-bold text-white" style={{backgroundColor:'#F50'}}>Save</button><button onClick={()=>setShowLog(false)} className="px-4 py-2 border rounded text-black">Cancel</button></div>
</div>}
</div>}

{tab==='history'&&<div>
<h3 className="font-bold mb-4 text-black">History</h3>
{workouts.length===0?<div className="text-center py-8 text-gray-400"><Clock/><p className="mt-2">No workouts</p></div>:<div className="space-y-3">{workouts.map(w=><div key={w.id} className="border rounded p-3"><div className="flex justify-between"><div><div className="font-bold text-black">{w.type}</div><div className="text-sm text-gray-600">{new Date(w.date).toLocaleDateString()}</div></div><div className="text-sm font-bold text-black">{w.duration}min</div></div>{w.notes&&<div className="text-sm text-gray-600 mt-2">{w.notes}</div>}</div>)}</div>}
</div>}
</div>
</div>
</div>
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
