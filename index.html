• Foam roll calves (cross one leg over, slow): 60s/leg`;

function WorkoutCard({day,isComplete,onToggle}){
  const [open,setOpen]=useState(false);
  if(!day||!day.sessionType) return null;
  const isRace=day.sessionType.includes('🏆');
  const isSim=day.sessionType.includes('🔥');
  const isRest=day.intensity==='None';
  const bc=isComplete?P:isRace?'#b8860b':isSim?PD:'#FFB6C1';
  return(
    <div className="border-2 rounded-lg p-4 transition" style={{backgroundColor:'#fff',borderColor:bc}}>
      <div className="flex items-start gap-3">
        <button onClick={onToggle} className="flex-shrink-0 mt-1 w-6 h-6 rounded border-2 flex items-center justify-center"
          style={isComplete?{backgroundColor:P,borderColor:P}:{borderColor:P}}>
          {isComplete&&<span style={{color:'#fff',fontSize:'12px'}}>✓</span>}
        </button>
        <div className="flex-1">
          <div className="flex items-start justify-between mb-1">
            <div>
              <div className="font-bold" style={{color:'#222'}}>{day.day}</div>
              <div className="text-sm" style={{color:isRace?'#b8860b':isSim?PD:'#999'}}>{day.sessionType}</div>
            </div>
            {day.duration&&<div className="text-xs text-gray-400 ml-2 flex-shrink-0">{day.duration}</div>}
          </div>
          {!isRest&&(
            <div className="mt-1 mb-2">
              <span className="text-xs px-2 py-1 rounded-full" style={{backgroundColor:PL,color:PD}}>{day.intensity}</span>
            </div>
          )}
          {day.notes&&(
            <button onClick={()=>setOpen(!open)} className="text-xs font-semibold mt-1" style={{color:P}}>
              {open?'▼ Hide Details':'▶ Show Full Workout'}
            </button>
          )}
          {open&&day.notes&&(
            <div className="mt-3 p-3 rounded text-sm whitespace-pre-line border max-h-96 overflow-y-auto"
              style={{backgroundColor:PL,borderColor:'#FFB6C1',color:'#333'}}>
              {day.notes}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

              <div><div className="text-xs" style={{color:'#aaa'}}>Age / Weight</div><div className="font-semibold" style={{color:'#333'}}>33 / 74kg</div></div>
              <div><div className="text-xs" style={{color:'#aaa'}}>Solo Hyrox PR</div><div className="font-semibold" style={{color:P}}>1:27:00</div></div>
              <div><div className="text-xs" style={{color:'#aaa'}}>Doubles PR</div><div className="font-semibold" style={{color:P}}>1:19:00</div></div>
            </div>
            <div className="mt-3 pt-3 border-t text-xs font-semibold" style={{borderColor:'#FFB6C1',color:PD}}>
              🦵 IT Band Syndrome (ITBS) — right knee. Progressive glute med + hip abductor overload throughout. IT band strap all runs. TFL + glute foam roll post every session.
            </div>
          </div>
          <div className="grid grid-cols-3 gap-2 mb-4">
            <div className="rounded-lg p-3 border-2" style={{borderColor:P,backgroundColor:'#fff'}}>
              <div className="text-xs mb-1" style={{color:'#aaa'}}>Race 1 — Mar 29</div>
              <div className="font-bold text-sm" style={{color:'#333'}}>Solo Hyrox</div>
              <div className="font-bold" style={{color:P}}>Sub 1:25</div>
              <div className="text-xs mt-1" style={{color:'#aaa'}}>Start: 1:20pm</div>
            </div>
            <div className="rounded-lg p-3 border-2" style={{borderColor:'#fb923c',backgroundColor:'#fff'}}>
              <div className="text-xs mb-1" style={{color:'#aaa'}}>Race 2 — Apr 12</div>
              <div className="font-bold text-sm" style={{color:'#333'}}>Marathon</div>
              <div className="font-bold" style={{color:'#fb923c'}}>Finisher 🏅</div>
            </div>
            <div className="rounded-lg p-3 border-2" style={{borderColor:PD,backgroundColor:'#fff'}}>
              <div className="text-xs mb-1" style={{color:'#aaa'}}>Race 3 — May 2</div>
              <div className="font-bold text-sm" style={{color:'#333'}}>Doubles + Tony</div>
              <div className="font-bold" style={{color:PD}}>Sub 1:15</div>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-3 mb-4">
            <div className="rounded-lg p-3 text-center border-2" style={{backgroundColor:'#fff',borderColor:'#FFB6C1'}}>
              <div className="text-2xl font-bold" style={{color:P}}>{totalDone}</div>
              <div className="text-xs" style={{color:'#aaa'}}>Sessions Done</div>
            </div>
            <div className="rounded-lg p-3 text-center border-2" style={{backgroundColor:'#fff',borderColor:'#FFB6C1'}}>
              <div className="text-2xl font-bold" style={{color:P}}>{getCompletion(week).pct}%</div>
              <div className="text-xs" style={{color:'#aaa'}}>This Week</div>
            </div>
            <div className="rounded-lg p-3 text-center border-2" style={{backgroundColor:'#fff',borderColor:'#FFB6C1'}}>
              <div className="text-2xl font-bold" style={{color:P}}>{Math.max(0,10-week)}</div>
              <div className="text-xs" style={{color:'#aaa'}}>Weeks Left</div>
            </div>
          </div>
        </div>

        <div className="flex gap-2 mb-5 border-b-2" style={{borderColor:'#FFB6C1'}}>
          {[['plan',CalIcon,'Plan'],['log',PlusIcon,'Log'],['history',TrendIcon,'History']].map(([t,I,label])=>(
            <button key={t} onClick={()=>setTab(t)}
              className={`px-5 py-3 font-semibold ${tab===t?'border-b-2':''}`}
              style={tab===t?{borderBottomColor:P,color:P}:{color:'#bbb'}}>
              <I s={16} style={{display:'inline',marginRight:'5px'}}/>{label}
            </button>
          ))}
        </div>

        {tab==='plan'&&(
          <div>
            <HRReference/>
            <div className="flex items-center gap-2 mb-5">
              <button onClick={()=>setWeek(Math.max(1,week-1))} disabled={week===1}
                className="px-3 py-2 border-2 rounded disabled:opacity-30"
                style={{backgroundColor:'#fff',borderColor:'#FFB6C1',color:'#333'}}>←</button>
              <div className="flex-1 flex gap-2 overflow-x-auto pb-1">
                {[...Array(9)].map((_,i)=>{
                  const w=i+1;
                  const c=getCompletion(w);
                  const lbl=(w===4||w===6||w===9)?'🏆':w===8?'🔥':'';
                  return(
                    <button key={w} onClick={()=>setWeek(w)}
                      className="flex-shrink-0 px-3 py-2 rounded-lg font-semibold text-sm border-2"
                      style={week===w?{backgroundColor:P,borderColor:P,color:'#fff'}:{backgroundColor:'#fff',borderColor:'#FFB6C1',color:'#333'}}>
                      <div>{lbl}W{w}</div>
                      {c.completed>0&&<div className="text-xs opacity-70">{c.pct}%</div>}
                    </button>
                  );
                })}
              </div>
              <button onClick={()=>setWeek(Math.min(9,week+1))} disabled={week===9}
                className="px-3 py-2 border-2 rounded disabled:opacity-30"
                style={{backgroundColor:'#fff',borderColor:'#FFB6C1',color:'#333'}}>→</button>
            </div>
            {currentPhase&&(
              <div className="rounded-lg p-4 mb-4 border-2" style={{backgroundColor:'#fff',borderColor:'#FFB6C1'}}>
                <div className="flex items-start justify-between">
                  <div>
                    <div className="text-2xl font-bold" style={{color:P}}>Week {week}</div>
                    <div className="text-xs mb-2" style={{color:'#aaa'}}>{currentPhase.dates}</div>
                    <div className="font-semibold" style={{color:PD}}>{currentPhase.phase}</div>
                  </div>
                  <div className="text-right">
                    <div className="text-xs" style={{color:'#aaa'}}>Intensity</div>
                    <div className="font-bold text-sm" style={{color:'#333'}}>{currentPhase.intensity}</div>
                    <div className="text-xs mt-1" style={{color:P}}>{getCompletion(week).completed}/{getCompletion(week).total} done</div>
                  </div>
                </div>
                <div className="mt-3 text-xs italic" style={{color:'#888'}}>{currentPhase.notes}</div>
              </div>
            )}
            <div className="space-y-3">
              {currentPlan.map((day,i)=>(
                <WorkoutCard key={`${week}-${i}`} day={day} isComplete={isComp(week,i)} onToggle={()=>toggleComp(week,i)}/>
              ))}
            </div>
          </div>
        )}

        {tab==='log'&&(
          <div>
            {!showLog?(
              <button onClick={()=>setShowLog(true)} className="w-full py-10 border-2 border-dashed rounded-lg flex flex-col items-center gap-2"
                style={{borderColor:P,backgroundColor:'#fff'}}>
                <PlusIcon s={32} style={{color:P}}/>
                <span className="text-lg font-semibold" style={{color:P}}>Log Workout</span>
              </button>
            ):(
              <div className="space-y-4">
                <h3 className="text-xl font-bold" style={{color:P}}>Log Workout</h3>
                <div>
                  <label className="block text-sm font-medium mb-2" style={{color:'#333'}}>Date</label>
                  <input type="date" value={logData.date} onChange={e=>setLogData({...logData,date:e.target.value})}
                    className="w-full rounded px-4 py-2 border-2" style={{backgroundColor:'#fff',borderColor:'#FFB6C1',color:'#333'}}/>
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2" style={{color:'#333'}}>Type</label>
                  <select value={logData.type} onChange={e=>setLogData({...logData,type:e.target.value})}
                    className="w-full rounded px-4 py-2 border-2" style={{backgroundColor:'#fff',borderColor:'#FFB6C1',color:'#333'}}>
                    <option value="">Select...</option>
                    {['Running — Zone 2','Running — Tempo','Running — Intervals','Hyrox Station Work',
                      'Doubles Sim','Upper Strength','Lower Strength + ITBS','ITBS Rehab',
                      'Mobility Session','Active Recovery','REST'].map(o=>(
                      <option key={o} value={o}>{o}</option>
                    ))}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2" style={{color:'#333'}}>Duration (min)</label>
                  <input type="number" value={logData.duration} onChange={e=>setLogData({...logData,duration:e.target.value})}
                    className="w-full rounded px-4 py-2 border-2" style={{backgroundColor:'#fff',borderColor:'#FFB6C1',color:'#333'}}/>
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2" style={{color:'#333'}}>Notes</label>
                  <textarea value={logData.notes} onChange={e=>setLogData({...logData,notes:e.target.value})}
                    placeholder="How did it feel? Lateral knee status? Glute activation done?" rows="3"
                    className="w-full rounded px-4 py-2 border-2" style={{backgroundColor:'#fff',borderColor:'#FFB6C1',color:'#333'}}/>
                </div>
                <div className="flex gap-3">
                  <button onClick={logWorkout} className="flex-1 px-6 py-3 rounded-lg font-semibold text-white" style={{backgroundColor:P}}>Save</button>
                  <button onClick={()=>setShowLog(false)} className="px-6 py-3 border-2 rounded-lg font-semibold" style={{backgroundColor:'#fff',borderColor:'#FFB6C1',color:'#333'}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        )}

        {tab==='history'&&(
          <div>
            <h3 className="text-xl font-bold mb-4" style={{color:P}}>History</h3>
            {workouts.length===0?(
              <div className="text-center py-12" style={{color:'#FFB6C1'}}>
                <ClockIcon s={48} style={{margin:'0 auto 12px',opacity:0.4}}/>
                <p>No workouts logged yet</p>
              </div>
            ):(
              <div className="space-y-3">
                {workouts.map(w=>(
                  <div key={w.id} className="rounded-lg p-4 border-2" style={{backgroundColor:'#fff',borderColor:'#FFB6C1'}}>
                    <div className="flex justify-between mb-1">
                      <div className="font-bold" style={{color:'#333'}}>{w.type}</div>
                      <div className="text-sm font-semibold" style={{color:P}}>{w.duration} min</div>
                    </div>
                    <div className="text-xs mb-1" style={{color:'#aaa'}}>{new Date(w.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</div>
                    {w.notes&&<div className="text-sm mt-2 pt-2 border-t" style={{borderColor:'#FFE4F0',color:'#555'}}>{w.notes}</div>}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
