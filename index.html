function WorkoutCard({day, isComplete, onToggle}) {
  const [open, setOpen] = useState(false);
  if (!day || !day.sessionType) return null;
  const isRace = day.sessionType.includes('🏆');
  const isSim  = day.sessionType.includes('🔥');
  const isRest = day.intensity === 'None';
  const borderCol = isComplete ? P : isRace ? '#ffd700' : isSim ? PD : '#FFB6C1';

  return (
    <div className="border-2 rounded-lg p-4 transition" style={{backgroundColor:'#fff', borderColor: borderCol}}>
      <div className="flex items-start gap-3">
        <button onClick={onToggle} className="flex-shrink-0 mt-1 w-6 h-6 rounded border-2 flex items-center justify-center"
          style={isComplete ? {backgroundColor: P, borderColor: P} : {borderColor: P}}>
          {isComplete && <span style={{color:'#fff', fontSize:'12px'}}>✓</span>}
        </button>
        <div className="flex-1">
          <div className="flex items-start justify-between mb-1">
            <div>
              <div className="font-bold" style={{color:'#222'}}>{day.day}</div>
              <div className="text-sm" style={{color: isRace ? '#b8860b' : isSim ? PD : '#888'}}>{day.sessionType}</div>
            </div>
            {day.duration && <div className="text-xs text-gray-400 ml-2 flex-shrink-0">{day.duration}</div>}
          </div>
          {!isRest && (
            <div className="mt-1 mb-2">
              <span className="text-xs px-2 py-1 rounded-full" style={{backgroundColor: PL, color: PD}}>{day.intensity}</span>
            </div>
          )}
          {day.notes && (
            <button onClick={() => setOpen(!open)} className="text-xs font-semibold mt-1" style={{color: P}}>
              {open ? '▼ Hide Details' : '▶ Show Full Workout'}
            </button>
          )}
          {open && day.notes && (
            <div className="mt-3 p-3 rounded text-sm whitespace-pre-line border max-h-96 overflow-y-auto"
              style={{backgroundColor: PL, borderColor:'#FFB6C1', color:'#333'}}>
              {day.notes}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

                      'Upper Strength','Lower Strength','Mobility Session','Active Recovery','REST'].map(o => (
                      <option key={o} value={o}>{o}</option>
                    ))}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2" style={{color:'#333'}}>Duration (min)</label>
                  <input type="number" value={logData.duration} onChange={e => setLogData({...logData, duration: e.target.value})}
                    className="w-full rounded px-4 py-2 border-2" style={{backgroundColor:'#fff', borderColor:'#FFB6C1', color:'#333'}}/>
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2" style={{color:'#333'}}>Notes</label>
                  <textarea value={logData.notes} onChange={e => setLogData({...logData, notes: e.target.value})}
                    placeholder="How did it feel? Knee status? Key times..." rows="3"
                    className="w-full rounded px-4 py-2 border-2" style={{backgroundColor:'#fff', borderColor:'#FFB6C1', color:'#333'}}/>
                </div>
                <div className="flex gap-3">
                  <button onClick={logWorkout} className="flex-1 px-6 py-3 rounded-lg font-semibold text-white" style={{backgroundColor: P}}>Save</button>
                  <button onClick={() => setShowLog(false)} className="px-6 py-3 border-2 rounded-lg font-semibold" style={{backgroundColor:'#fff', borderColor:'#FFB6C1', color:'#333'}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── HISTORY TAB ── */}
        {tab === 'history' && (
          <div>
            <h3 className="text-xl font-bold mb-4" style={{color: P}}>History</h3>
            {workouts.length === 0 ? (
              <div className="text-center py-12" style={{color:'#FFB6C1'}}>
                <ClockIcon s={48} style={{margin:'0 auto 12px', opacity:0.4}}/>
                <p>No workouts logged yet</p>
              </div>
            ) : (
              <div className="space-y-3">
                {workouts.map(w => (
                  <div key={w.id} className="rounded-lg p-4 border-2" style={{backgroundColor:'#fff', borderColor:'#FFB6C1'}}>
                    <div className="flex justify-between mb-1">
                      <div className="font-bold" style={{color:'#333'}}>{w.type}</div>
                      <div className="text-sm font-semibold" style={{color: P}}>{w.duration} min</div>
                    </div>
                    <div className="text-xs mb-1" style={{color:'#aaa'}}>{new Date(w.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</div>
                    {w.notes && <div className="text-sm mt-2 pt-2 border-t" style={{borderColor:'#FFE4F0', color:'#555'}}>{w.notes}</div>}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
