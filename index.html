function WorkoutCard({day,isComplete,onToggle,onDragStart,onDragOver,onDrop,isDragging}){
  const[showDetails,setShowDetails]=useState(false);
  
  if(!day){
    return <div 
      className="bg-gray-50 border-2 border-dashed border-gray-300 rounded-lg p-4 text-center text-gray-400"
      onDragOver={onDragOver}
      onDrop={onDrop}
    >
      Drop workout here to reschedule
    </div>;
  }
  
  return <div 
    className={`bg-white border-2 rounded-lg p-4 transition cursor-move ${isComplete?'shadow-lg':'border-gray-200'} ${isDragging?'opacity-50':''}`} 
    style={isComplete?{borderColor:'#FF4500'}:{}}
    draggable="true"
    onDragStart={onDragStart}
    onDragOver={onDragOver}
    onDrop={onDrop}
  >
    <div className="flex items-start gap-4">
      <button onClick={onToggle} className={`flex-shrink-0 mt-1 w-6 h-6 rounded border-2 flex items-center justify-center transition text-white ${isComplete?'border-transparent':'border-gray-300 hover:border-gray-400'}`} style={isComplete?{backgroundColor:'#FF4500'}:{}}>{isComplete&&<CheckCircle s={20}/>}</button>
      <div className="flex-1">
        <div className="flex items-start justify-between mb-2">
          <div><div className="font-bold text-lg text-black">{day.day}</div><div className="text-sm text-gray-600">{day.type} - {day.focus}</div></div>
          <div className="px-3 py-1 rounded-full text-xs font-semibold text-white" style={{backgroundColor:day.type==='Running'?'#FF4500':day.type==='Strength'?'#000000':day.type==='Hybrid'?'#FF4500':day.type==='Rest'?'#666666':'#333333'}}>{day.type}</div>
        </div>
        <div className="text-sm text-gray-700 mb-2">{day.detail}</div>
        <button onClick={()=>setShowDetails(!showDetails)} className="text-xs font-semibold" style={{color:'#FF4500'}}>{showDetails?'▼ Hide Details':'▶ Show Full Workout'}</button>
        {showDetails&&<div className="mt-3 p-3 bg-gray-50 border border-gray-200 rounded text-sm text-black whitespace-pre-line">{day.specifics}</div>}
      </div>
    </div>
  </div>
}

  11: {phase:'Half Marathon Specific',dates:'Feb 16-22',focus:'Begin taper',intensity:'Moderate-High',notes:'Reduce volume, maintain intensity. Last long run 16km',startDate:'2026-02-16'},
  12: {phase:'Half Marathon Race Week',dates:'Feb 23-Mar 1',focus:'🏃‍♀️ HALF MARATHON - Mar 1',intensity:'Low-Taper',notes:'Light activation only. Target: Sub 2:00:00',startDate:'2026-02-23'},
  13: {phase:'Recovery Week',dates:'Mar 2-8',focus:'Post-Half recovery',intensity:'Very Low',notes:'Complete rest Mon-Thu, light return Fri onwards',startDate:'2026-03-02'},
  14: {phase:'Hyrox Peak',dates:'Mar 9-15',focus:'Full Hyrox simulations',intensity:'Very High',notes:'8-station practice, power work, race pace runs',startDate:'2026-03-09'},
  15: {phase:'Hyrox Peak',dates:'Mar 16-22',focus:'Final Hyrox prep',intensity:'Very High',notes:'Near-race effort simulation, station power work',startDate:'2026-03-16'},
  16: {phase:'Hyrox Taper & Race',dates:'Mar 23-29',focus:'🔥 SOLO HYROX - Mar 29',intensity:'Low-Taper',notes:'Light technique work only. Target: Sub 1:25:00',startDate:'2026-03-23'},
  17: {phase:'Recovery Week',dates:'Mar 30-Apr 5',focus:'Post-Hyrox recovery',intensity:'Very Low',notes:'Complete rest Mon-Thu, gentle return Fri onwards',startDate:'2026-03-30'},
  18: {phase:'Marathon Week',dates:'Apr 6-12',focus:'🏃‍♀️ FULL MARATHON - Apr 12',intensity:'Low-Taper',notes:'Light shakeouts only. Completion goal after Hyrox',startDate:'2026-04-06'}
};
const toggleComp=(w,i)=>{
  const k=`jade-${w}-${i}`;
  setComp(p=>({...p,[k]:!p[k]}));
};

const isComp=(w,i)=>comp[`jade-${w}-${i}`]||false;

const getCompletion=(w)=>{
  const t=jadeWeeklyPlans[w];
  if(!t)return{completed:0,total:0,percentage:0};
  let c=0;
  t.forEach((_,i)=>{if(isComp(w,i))c++;});
  return{completed:c,total:t.length,percentage:Math.round((c/t.length)*100)};
};

const getStats=()=>{
  const currentPlanData=jadeWeeklyPlans[week];
  if(!currentPlanData)return{total:0,running:0,strength:0,hybrid:0};
  
  let runningCount=0;
  let strengthCount=0;
  let hybridCount=0;
  let totalCount=0;
  
  currentPlanData.forEach((day,i)=>{
    if(isComp(week,i)){
      totalCount++;
      if(day.type.includes('Run')||day.type==='Tempo Run'||day.type==='Recovery Run'||day.type==='Speed Work'||day.type==='Threshold Run'||day.type==='Easy Run'||day.type==='Shakeout')runningCount++;
      if(day.type==='Strength')strengthCount++;
      if(day.type==='Hybrid'||day.type==='Run + Stations'||day.type==='Intervals + Stations'||day.type==='Hyrox Simulation'||day.type==='Station Power'||day.type==='Race Pace Practice'||day.type==='Light Stations')hybridCount++;
    }
  });
  
  return{total:totalCount,running:runningCount,strength:strengthCount,hybrid:hybridCount};
};

const logWorkout=()=>{
  if(!currentWorkout.type)return;
  const newWorkout={...currentWorkout,id:Date.now()};
  setWorkouts([newWorkout,...workouts]);
  setCurrentWorkout({date:new Date().toISOString().split('T')[0],type:'',duration:'',notes:''});
  setShowLogForm(false);
};

const currentPlan=jadeWeeklyPlans[week]||[];
const currentPhase=programPhases[week];
// State for rescheduling
const[weekSchedule,setWeekSchedule]=useState({});
const[draggedWorkout,setDraggedWorkout]=useState(null);

// Load custom schedule from localStorage
useEffect(()=>{
  try{
    const savedSchedule=JSON.parse(localStorage.getItem('jade_schedule')||'{}');
    setWeekSchedule(savedSchedule);
  }catch(e){}
},[]);

// Save schedule changes
useEffect(()=>{
  localStorage.setItem('jade_schedule',JSON.stringify(weekSchedule));
},[weekSchedule]);

// Get the actual workout for a given day (considering reschedules)
const getWorkoutForDay=(weekNum,dayIndex)=>{
  const scheduleKey=`${weekNum}-${dayIndex}`;
  if(weekSchedule[scheduleKey]!==undefined){
    // This day has been rescheduled to show a different workout
    const originalIndex=weekSchedule[scheduleKey];
    return{workout:jadeWeeklyPlans[weekNum][originalIndex],originalIndex};
  }
  // Check if this workout has been moved elsewhere
  const movedTo=Object.keys(weekSchedule).find(key=>weekSchedule[key]===dayIndex&&key.startsWith(`${weekNum}-`));
  if(movedTo){
    // This workout has been moved to another day
    return{workout:null,originalIndex:dayIndex};
  }
  return{workout:jadeWeeklyPlans[weekNum][dayIndex],originalIndex:dayIndex};
};

// Handle drag start
const handleDragStart=(weekNum,dayIndex)=>{
  setDraggedWorkout({week:weekNum,index:dayIndex});
};

// Handle drag over
const handleDragOver=(e)=>{
  e.preventDefault();
};

// Handle drop
const handleDrop=(weekNum,targetDayIndex)=>{
  if(!draggedWorkout||draggedWorkout.week!==weekNum)return;
  
  const sourceIndex=draggedWorkout.index;
  if(sourceIndex===targetDayIndex)return;
  
  setWeekSchedule(prev=>{
    const newSchedule={...prev};
    const sourceKey=`${weekNum}-${sourceIndex}`;
    const targetKey=`${weekNum}-${targetDayIndex}`;
    
    // Get what's currently at source and target
    const sourceWorkoutIndex=prev[sourceKey]!==undefined?prev[sourceKey]:sourceIndex;
    const targetWorkoutIndex=prev[targetKey]!==undefined?prev[targetKey]:targetDayIndex;
    
    // Swap them
    newSchedule[sourceKey]=targetWorkoutIndex;
    newSchedule[targetKey]=sourceWorkoutIndex;
    
    return newSchedule;
  });
  
  setDraggedWorkout(null);
};

// Reset week schedule
const resetWeekSchedule=(weekNum)=>{
  setWeekSchedule(prev=>{
    const newSchedule={...prev};
    Object.keys(newSchedule).forEach(key=>{
      if(key.startsWith(`${weekNum}-`)){
        delete newSchedule[key];
      }
    });
    return newSchedule;
  });
};
const currentPlan=jadeWeeklyPlans[week]||[];
const currentPhase=programPhases[week];
    return <div className="min-h-screen bg-black text-white p-4">
  <div className="max-w-6xl mx-auto pb-20">
    <div className="mb-8">
      <div className="flex items-center justify-between mb-4">
        <div className="flex items-center gap-3">
          <Flame s={40} style={{color:'#FF4500'}}/>
          <div>
            <h1 className="text-3xl font-bold">Jade's Training Plan</h1>
            <p className="text-gray-400 text-sm">18-Week Marathon & Hyrox Program</p>
          </div>
        </div>
      </div>
      <div className="bg-white border-2 border-gray-200 rounded-lg p-4">
        <div className="flex items-center gap-3">
          <User s={24} style={{color:'#FF4500'}}/>
          <div>
            <div className="font-bold text-black">{USER.name}</div>
            <div className="text-sm text-gray-600">{USER.category}</div>
          </div>
        </div>
      </div>
    </div>

    <div className="grid grid-cols-3 gap-4 mb-6">
      <div className="bg-white border-2 border-gray-200 rounded-lg p-4">
        <div className="text-gray-600 text-sm font-semibold">Half Marathon</div>
        <div className="text-xl font-bold" style={{color:'#FF4500'}}>Mar 1, 2026</div>
        <div className="text-gray-600 text-xs">Target: Sub 2:00:00</div>
      </div>
      <div className="bg-white border-2 border-gray-200 rounded-lg p-4">
        <div className="text-gray-600 text-sm font-semibold">Solo Hyrox</div>
        <div className="text-xl font-bold" style={{color:'#FF4500'}}>Mar 29, 2026</div>
        <div className="text-gray-600 text-xs">Target: Sub 1:25:00</div>
      </div>
      <div className="bg-white border-2 border-gray-200 rounded-lg p-4">
        <div className="text-gray-600 text-sm font-semibold">Full Marathon</div>
        <div className="text-xl font-bold" style={{color:'#FF4500'}}>Apr 12, 2026</div>
        <div className="text-gray-600 text-xs">Completion</div>
      </div>
    </div>
    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      {(()=>{
        const s=getStats();
        return(<>
          <div className="bg-white border-2 border-gray-200 rounded-lg p-4">
            <div className="text-gray-600 text-sm">This Week</div>
            <div className="text-3xl font-bold" style={{color:'#FF4500'}}>{s.total}</div>
            <div className="text-gray-600 text-xs">Completed</div>
          </div>
          <div className="bg-white border-2 border-gray-200 rounded-lg p-4">
            <div className="text-gray-600 text-sm">Running</div>
            <div className="text-3xl font-bold text-black">{s.running}</div>
            <div className="text-gray-600 text-xs">Sessions</div>
          </div>
          <div className="bg-white border-2 border-gray-200 rounded-lg p-4">
            <div className="text-gray-600 text-sm">Strength</div>
            <div className="text-3xl font-bold text-black">{s.strength}</div>
            <div className="text-gray-600 text-xs">Sessions</div>
          </div>
          <div className="bg-white border-2 border-gray-200 rounded-lg p-4">
            <div className="text-gray-600 text-sm">Hybrid</div>
            <div className="text-3xl font-bold text-black">{s.hybrid}</div>
            <div className="text-gray-600 text-xs">Sessions</div>
          </div>
        </>);
      })()}
    </div>
    <div className="flex gap-2 mb-6 border-b-2 border-gray-200 overflow-x-auto">
      {['plan','log','history'].map(t=>{
        const icons={plan:Calendar,log:Plus,history:TrendingUp};
        const I=icons[t];
        const labels={plan:'Plan',log:'Log',history:'History'};
        return <button key={t} onClick={()=>setTab(t)} className={`px-6 py-3 font-semibold whitespace-nowrap ${tab===t?'border-b-2':'text-gray-500'}`} style={tab===t?{borderBottomColor:'#FF4500',color:'#FF4500'}:{}}><I s={18} className="inline mr-2"/>{labels[t]}</button>
      })}
    </div>
    <div className="bg-white border-2 border-gray-200 rounded-lg p-6 text-black">
      {tab==='plan'&&<div>
        <h3 className="text-xl font-bold mb-4">18-Week Training Program</h3>
        <div className="flex items-center gap-3 mb-6">
          <button onClick={()=>setWeek(Math.max(1,week-1))} disabled={week===1} className="px-4 py-2 bg-white border-2 border-gray-200 rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed text-black">←</button>
          <div className="flex-1 flex gap-2 overflow-x-auto pb-2">
            {[...Array(18)].map((_,i)=>{
              const w=i+1;
              const c=getCompletion(w);
              const info=programPhases[w];
              const d=new Date(info.startDate);
              const isRaceWeek=w===12||w===16||w===18;
              return <button key={w} onClick={()=>setWeek(w)} className={`flex-shrink-0 px-4 py-3 rounded-lg font-semibold transition border-2 ${week===w?'text-white shadow-lg':'bg-white text-black hover:bg-gray-50 border-gray-200'}`} style={week===w?{backgroundColor:'#FF4500',borderColor:'#FF4500'}:{}}><div className="text-sm">{isRaceWeek?'🏆 ':''}{w}</div><div className="text-xs opacity-75">{d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>{c.completed>0&&<div className="text-xs mt-1">{c.percentage}%</div>}</button>
            })}
          </div>
          <button onClick={()=>setWeek(Math.min(18,week+1))} disabled={week===18} className="px-4 py-2 bg-white border-2 border-gray-200 rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed text-black">→</button>
        </div>
        {currentPhase&&<div className="bg-white border-2 border-gray-200 rounded-lg p-5 mb-6">
          <div className="flex justify-between items-start mb-3">
            <div>
              <h4 className="text-2xl font-bold text-black">Week {week}</h4>
              <div className="text-sm text-gray-600 mt-1">{currentPhase.dates}</div>
            </div>
            <div className="flex gap-2 items-center">
              {(week===12||week===16||week===18)&&<div className="px-4 py-2 rounded-lg font-bold text-sm shadow-lg text-white" style={{backgroundColor:'#FF4500'}}>🏆 RACE WEEK</div>}
              <button 
                onClick={()=>resetWeekSchedule(week)} 
                className="px-3 py-2 text-xs font-semibold rounded-lg border-2 border-gray-300 text-gray-700 hover:bg-gray-50"
              >
                Reset Schedule
              </button>
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
            <div><div className="text-sm text-gray-600">Phase</div><div className="text-lg font-semibold text-black">{currentPhase.phase}</div></div>
            <div><div className="text-sm text-gray-600">Intensity</div><div className="text-lg font-semibold text-black">{currentPhase.intensity}</div></div>
            <div><div className="text-sm text-gray-600">Completion</div><div className="text-lg font-semibold text-black">{getCompletion(week).completed}/{getCompletion(week).total} sessions</div></div>
          </div>
          <div className="mt-3 text-sm text-gray-700 italic">{currentPhase.notes}</div>
          <div className="mt-3 text-xs text-gray-500 bg-blue-50 p-2 rounded border border-blue-200">
            💡 <strong>Tip:</strong> Drag and drop workouts to reschedule them within the week. Click "Reset Schedule" to restore original plan.
          </div>
        </div>}

        <div className="space-y-3">
          {currentPlan.length>0?currentPlan.map((day,i)=>{
            const {workout,originalIndex}=getWorkoutForDay(week,i);
            return <WorkoutCard 
              key={`${week}-${i}`} 
              day={workout} 
              isComplete={isComp(week,originalIndex)} 
              onToggle={()=>toggleComp(week,originalIndex)}
              onDragStart={()=>handleDragStart(week,i)}
              onDragOver={handleDragOver}
              onDrop={()=>handleDrop(week,i)}
              isDragging={draggedWorkout?.week===week&&draggedWorkout?.index===i}
            />
          }):<div className="text-center py-8 text-gray-600">No workouts available for this week</div>}
        </div>
      </div>}
      {tab==='log'&&<div>
        {!showLogForm?<button onClick={()=>setShowLogForm(true)} className="w-full py-8 border-2 border-dashed rounded-lg" style={{borderColor:'#FF4500',backgroundColor:'#FFF'}}><Plus s={32} style={{color:'#FF4500'}}/><div className="text-xl font-semibold" style={{color:'#FF4500'}}>Log Workout</div></button>:<div className="space-y-4">
          <h3 className="text-xl font-bold text-black">Log Workout</h3>
          <div><label className="block text-sm font-medium mb-2 text-black">Date</label><input type="date" value={currentWorkout.date} onChange={e=>setCurrentWorkout({...currentWorkout,date:e.target.value})} className="w-full bg-white text-black rounded px-4 py-2 border-2 border-gray-200"/></div>
          <div><label className="block text-sm font-medium mb-2 text-black">Type</label><select value={currentWorkout.type} onChange={e=>setCurrentWorkout({...currentWorkout,type:e.target.value})} className="w-full bg-white text-black rounded px-4 py-2 border-2 border-gray-200"><option value="">Select...</option><option value="Running">Running</option><option value="Strength">Strength</option><option value="Hybrid">Hybrid</option><option value="Rest">Rest</option></select></div>
          <div><label className="block text-sm font-medium mb-2 text-black">Duration (min)</label><input type="number" value={currentWorkout.duration} onChange={e=>setCurrentWorkout({...currentWorkout,duration:e.target.value})} placeholder="60" className="w-full bg-white text-black rounded px-4 py-2 border-2 border-gray-200"/></div>
          <div><label className="block text-sm font-medium mb-2 text-black">Notes</label><textarea value={currentWorkout.notes} onChange={e=>setCurrentWorkout({...currentWorkout,notes:e.target.value})} placeholder="How did it feel?" className="w-full bg-white text-black rounded px-4 py-2 h-24 border-2 border-gray-200"/></div>
          <div className="flex gap-3"><button onClick={logWorkout} className="flex-1 px-6 py-3 rounded-lg font-semibold text-white" style={{backgroundColor:'#FF4500'}}>Save</button><button onClick={()=>setShowLogForm(false)} className="px-6 py-3 bg-white border-2 border-gray-300 rounded-lg font-semibold text-black">Cancel</button></div>
        </div>}
      </div>}
      {tab==='history'&&<div>
        <h3 className="text-xl font-bold mb-4 text-black">History</h3>
        {workouts.length===0?<div className="text-center py-12 text-gray-400"><Clock s={48} className="mx-auto mb-4 opacity-50"/><p>No workouts logged</p></div>:<div className="space-y-3">{workouts.map(w=><div key={w.id} className="bg-white border-2 rounded-lg p-4"><div className="flex justify-between mb-2"><div><div className="font-bold text-black">{w.type}</div><div className="text-sm text-gray-600">{new Date(w.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</div></div><div className="text-sm font-semibold text-black">{w.duration} min</div></div>{w.notes&&<div className="text-sm text-gray-700 mt-2 pt-2 border-t border-gray-300">{w.notes}</div>}</div>)}</div>}
      </div>}
    </div>
  </div>
</div>
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
