  function WorkoutCard({day,isComplete,onToggle,onDragStart,onDragOver,onDrop,isDragging}){
  const[showDetails,setShowDetails]=useState(false);
  
  if(!day){
    return <div 
      className="border-2 border-dashed rounded-lg p-4 text-center"
      style={{backgroundColor:'#FFE4F0',borderColor:'#FFB6C1',color:'#FF69B4'}}
      onDragOver={onDragOver}
      onDrop={onDrop}
    >
      Drop workout here to reschedule
    </div>;
  }
  
  return <div 
    className={`bg-white border-2 rounded-lg p-4 transition cursor-move ${isComplete?'shadow-lg':''} ${isDragging?'opacity-50':''}`} 
    style={isComplete?{borderColor:'#FF69B4'}:{borderColor:'#FFE4F0'}}
    draggable="true"
    onDragStart={onDragStart}
    onDragOver={onDragOver}
    onDrop={onDrop}
  >
    <div className="flex items-start gap-4">
      <button onClick={onToggle} className={`flex-shrink-0 mt-1 w-6 h-6 rounded border-2 flex items-center justify-center transition text-white ${isComplete?'border-transparent':''}`} style={isComplete?{backgroundColor:'#FF69B4',borderColor:'#FF69B4'}:{borderColor:'#FFB6C1'}}>{isComplete&&<CheckCircle s={20}/>}</button>
      <div className="flex-1">
        <div className="flex items-start justify-between mb-2">
          <div><div className="font-bold text-lg text-black">{day.day}</div><div className="text-sm text-gray-600">{day.type} - {day.focus}</div></div>
          <div className="px-3 py-1 rounded-full text-xs font-semibold text-white" style={{backgroundColor:day.type.includes('Rest')?'#E6B8E6':day.type.includes('Strength')?'#FF69B4':'#FFB6C1'}}>{day.type}</div>
        </div>
        <div className="text-sm text-gray-700 mb-2">{day.detail}</div>
        <button onClick={()=>setShowDetails(!showDetails)} className="text-xs font-semibold" style={{color:'#FF69B4'}}>{showDetails?'▼ Hide Details':'▶ Show Full Workout'}</button>
        {showDetails&&<div className="mt-3 p-3 rounded text-sm text-black whitespace-pre-line border" style={{backgroundColor:'#FFE4F0',borderColor:'#FFB6C1'}}>{day.specifics}</div>}
      </div>
    </div>
  </div>
}

const getWorkoutForDay=(weekNum,dayIndex)=>{
  const scheduleKey=`${weekNum}-${dayIndex}`;
  if(weekSchedule[scheduleKey]!==undefined){
    const originalIndex=weekSchedule[scheduleKey];
    return{workout:jadeWeeklyPlans[weekNum][originalIndex],originalIndex};
  }
  const movedTo=Object.keys(weekSchedule).find(key=>weekSchedule[key]===dayIndex&&key.startsWith(`${weekNum}-`));
  if(movedTo){
    return{workout:null,originalIndex:dayIndex};
  }
  return{workout:jadeWeeklyPlans[weekNum][dayIndex],originalIndex:dayIndex};
};

const handleDragStart=(weekNum,dayIndex)=>{
  setDraggedWorkout({week:weekNum,index:dayIndex});
};

const handleDragOver=(e)=>{
  e.preventDefault();
};

const handleDrop=(weekNum,targetDayIndex)=>{
  if(!draggedWorkout||draggedWorkout.week!==weekNum)return;
  
  const sourceIndex=draggedWorkout.index;
  if(sourceIndex===targetDayIndex)return;
  
  setWeekSchedule(prev=>{
    const newSchedule={...prev};
    const sourceKey=`${weekNum}-${sourceIndex}`;
    const targetKey=`${weekNum}-${targetDayIndex}`;
    
    const sourceWorkoutIndex=prev[sourceKey]!==undefined?prev[sourceKey]:sourceIndex;
    const targetWorkoutIndex=prev[targetKey]!==undefined?prev[targetKey]:targetDayIndex;
    
    newSchedule[sourceKey]=targetWorkoutIndex;
    newSchedule[targetKey]=sourceWorkoutIndex;
    
    return newSchedule;
  });
  
  setDraggedWorkout(null);
};

const resetWeekSchedule=(weekNum)=>{
  setWeekSchedule(prev=>{
    const newSchedule={...prev};
    Object.keys(newSchedule).forEach(key=>{
      if(key.startsWith(`${weekNum}-`)){
        delete newSchedule[key];
      }
    });
    return newSchedule;
  });
};

            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
            <div><div className="text-sm text-gray-600">Phase</div><div className="text-lg font-semibold" style={{color:'#FF69B4'}}>{currentPhase.phase}</div></div>
            <div><div className="text-sm text-gray-600">Intensity</div><div className="text-lg font-semibold text-black">{currentPhase.intensity}</div></div>
            <div><div className="text-sm text-gray-600">Completion</div><div className="text-lg font-semibold text-black">{getCompletion(week).completed}/{getCompletion(week).total} sessions</div></div>
          </div>
          <div className="mt-3 text-sm text-gray-700 italic">{currentPhase.notes}</div>
          <div className="mt-3 text-xs p-2 rounded border" style={{backgroundColor:'#FFE4F0',borderColor:'#FFB6C1',color:'#C56A9E'}}>
            💡 <strong>Tip:</strong> Drag and drop workouts to reschedule them within the week. Click "Reset Schedule" to restore original plan.
          </div>
        </div>}
        <div className="space-y-3">
          {currentPlan.length>0?currentPlan.map((day,i)=>{
            const {workout,originalIndex}=getWorkoutForDay(week,i);
            return <WorkoutCard 
              key={`${week}-${i}`} 
              day={workout} 
              isComplete={isComp(week,originalIndex)} 
              onToggle={()=>toggleComp(week,originalIndex)}
              onDragStart={()=>handleDragStart(week,i)}
              onDragOver={handleDragOver}
              onDrop={()=>handleDrop(week,i)}
              isDragging={draggedWorkout?.week===week&&draggedWorkout?.index===i}
            />
          }):<div className="text-center py-8 text-gray-600">No workouts available for this week</div>}
        </div>
      </div>}
   {tab==='log'&&<div>
        {!showLogForm?<button onClick={()=>setShowLogForm(true)} className="w-full py-8 border-2 border-dashed rounded-lg" style={{borderColor:'#FF69B4',backgroundColor:'#FFF'}}><Plus s={32} style={{color:'#FF69B4'}}/><div className="text-xl font-semibold" style={{color:'#FF69B4'}}>Log Workout</div></button>:<div className="space-y-4">
          <h3 className="text-xl font-bold" style={{color:'#FF69B4'}}>Log Workout</h3>
          <div><label className="block text-sm font-medium mb-2 text-black">Date</label><input type="date" value={currentWorkout.date} onChange={e=>setCurrentWorkout({...currentWorkout,date:e.target.value})} className="w-full bg-white text-black rounded px-4 py-2 border-2" style={{borderColor:'#FFB6C1'}}/></div>
          <div><label className="block text-sm font-medium mb-2 text-black">Type</label><select value={currentWorkout.type} onChange={e=>setCurrentWorkout({...currentWorkout,type:e.target.value})} className="w-full bg-white text-black rounded px-4 py-2 border-2" style={{borderColor:'#FFB6C1'}}><option value="">Select...</option><option value="Running">Running</option><option value="Strength">Strength</option><option value="Hybrid">Hybrid</option><option value="Rest">Rest</option></select></div>
          <div><label className="block text-sm font-medium mb-2 text-black">Duration (min)</label><input type="number" value={currentWorkout.duration} onChange={e=>setCurrentWorkout({...currentWorkout,duration:e.target.value})} placeholder="60" className="w-full bg-white text-black rounded px-4 py-2 border-2" style={{borderColor:'#FFB6C1'}}/></div>
          <div><label className="block text-sm font-medium mb-2 text-black">Notes</label><textarea value={currentWorkout.notes} onChange={e=>setCurrentWorkout({...currentWorkout,notes:e.target.value})} placeholder="How did it feel?" className="w-full bg-white text-black rounded px-4 py-2 h-24 border-2" style={{borderColor:'#FFB6C1'}}/></div>
          <div className="flex gap-3"><button onClick={logWorkout} className="flex-1 px-6 py-3 rounded-lg font-semibold text-white" style={{backgroundColor:'#FF69B4'}}>Save</button><button onClick={()=>setShowLogForm(false)} className="px-6 py-3 bg-white border-2 rounded-lg font-semibold text-black" style={{borderColor:'#FFB6C1'}}>Cancel</button></div>
        </div>}
      </div>}
   {tab==='history'&&<div>
        <h3 className="text-xl font-bold mb-4" style={{color:'#FF69B4'}}>History</h3>
        {workouts.length===0?<div className="text-center py-12" style={{color:'#FFB6C1'}}><Clock s={48} className="mx-auto mb-4 opacity-50"/><p>No workouts logged</p></div>:<div className="space-y-3">{workouts.map(w=><div key={w.id} className="bg-white border-2 rounded-lg p-4 shadow-sm" style={{borderColor:'#FFE4F0'}}><div className="flex justify-between mb-2"><div><div className="font-bold text-black">{w.type}</div><div className="text-sm text-gray-600">{new Date(w.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</div></div><div className="text-sm font-semibold" style={{color:'#FF69B4'}}>{w.duration} min</div></div>{w.notes&&<div className="text-sm text-gray-700 mt-2 pt-2 border-t" style={{borderColor:'#FFE4F0'}}>{w.notes}</div>}</div>)}</div>}
      </div>}
    </div>
  </div>
</div>
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
